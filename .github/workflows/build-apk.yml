name: Build Native Android App (ripple.apk)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Native APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Web App Dependencies
        run: npm ci || npm install

      - name: Build Web App
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://mock-supabase.ripple.com"
          VITE_SUPABASE_ANON_KEY: "mock-anon-key"

      - name: Install Ionic Capacitor Core & Android Platform
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor Configuration
        run: |
          npx cap init Ripple com.ripple.app --web-dir=dist

      - name: Add Android Native platform template
        run: |
          npx cap add android

      - name: Sync Web assets to Android Native Gradle context
        run: |
          npx cap sync android

      - name: Build Android Debug APK with Gradle wrapper
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename and Prepare ripple.apk Deliverable
        run: |
          mkdir -p build-artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk build-artifacts/ripple.apk

      - name: Upload ripple.apk Installable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ripple-Android-APK
          path: build-artifacts/ripple.apk
          if-no-files-found: error
          retention-days: 14
